<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaa — Live Theme Demo</title>
    <meta name="robots" content="noindex">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: #07020f;
            color: #f5f0f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        a {
            -webkit-tap-highlight-color: transparent;
        }

        /* ───────── TOP BAR ───────── */
        #demoBar {
            position: sticky;
            top: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: rgba(8,3,16,.86);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border-bottom: 1px solid rgba(255,255,255,.07);
        }

            #demoBar .brand {
                font-weight: 800;
                font-size: 15px;
                letter-spacing: .2px;
                margin-right: auto;
                white-space: nowrap;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            #demoBar a.backLink {
                background: rgba(255,255,255,.06);
                color: #fff;
                border: 1px solid rgba(255,255,255,.13);
                padding: 8px 14px;
                border-radius: 10px;
                font-size: 13px;
                font-weight: 600;
                text-decoration: none;
                white-space: nowrap;
                transition: background .2s ease, transform .2s ease;
            }

                #demoBar a.backLink:hover {
                    background: rgba(255,255,255,.12);
                    transform: translateY(-1px);
                }

        /* ───────── MODE SEGMENTED CONTROL ───────── */
        .seg {
            position: relative;
            display: inline-flex;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 999px;
            padding: 3px;
            gap: 2px;
        }

            .seg button {
                position: relative;
                z-index: 2;
                border: 0;
                background: transparent;
                color: rgba(255,255,255,.6);
                font-size: 13px;
                font-weight: 700;
                padding: 7px 16px;
                border-radius: 999px;
                cursor: pointer;
                transition: color .25s ease;
                white-space: nowrap;
            }

                .seg button.on {
                    color: #07020f;
                }

            .seg .segThumb {
                position: absolute;
                top: 3px;
                bottom: 3px;
                left: 3px;
                width: calc(50% - 3px);
                border-radius: 999px;
                background: linear-gradient(135deg, #e8739c, #c44569);
                box-shadow: 0 4px 14px rgba(232,115,156,.4);
                transition: transform .32s cubic-bezier(.4,0,.2,1), background .32s ease, box-shadow .32s ease;
                z-index: 1;
            }

                .seg .segThumb.fr {
                    background: linear-gradient(135deg, #f5c842, #d4881a);
                    box-shadow: 0 4px 14px rgba(245,200,66,.35);
                }

                .seg .segThumb.toFr {
                    transform: translateX(100%);
                }

        /* ───────── THEME CHIP ROW ───────── */
        #themeRow {
            position: sticky;
            top: 56px;
            z-index: 998;
            display: flex;
            gap: 9px;
            padding: 12px 16px;
            overflow-x: auto;
            scroll-behavior: smooth;
            background: rgba(8,3,16,.78);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,.06);
            scrollbar-width: none;
        }

            #themeRow::-webkit-scrollbar {
                display: none;
            }

        .chip {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border-radius: 999px;
            font-size: 13.5px;
            font-weight: 700;
            color: rgba(255,255,255,.72);
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            cursor: pointer;
            white-space: nowrap;
            transition: transform .22s cubic-bezier(.4,0,.2,1), background .22s ease, border-color .22s ease, box-shadow .22s ease, color .22s ease;
            user-select: none;
        }

            .chip:hover {
                background: rgba(255,255,255,.09);
                transform: translateY(-1px);
            }

            .chip.active {
                color: #fff;
                border-color: transparent;
                transform: translateY(-1px) scale(1.02);
            }

            .chip .dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                box-shadow: 0 0 8px currentColor;
                flex-shrink: 0;
            }

        /* ───────── PREVIEW FRAME ───────── */
        #demoFrameWrap {
            position: relative;
            width: 100%;
            height: calc(100vh - 113px);
            background: #07020f;
            overflow: hidden;
        }

        .demoFrame {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #07020f;
            opacity: 0;
            transition: opacity .45s ease;
            pointer-events: none;
        }

            .demoFrame.show {
                opacity: 1;
                pointer-events: auto;
                z-index: 2;
            }

        #demoLoading {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(255,255,255,.55);
            font-size: 13.5px;
            font-weight: 600;
            background: #07020f;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }

            #demoLoading.on {
                opacity: 1;
            }

            #demoLoading .spin {
                width: 26px;
                height: 26px;
                border-radius: 50%;
                border: 2.5px solid rgba(255,255,255,.15);
                border-top-color: #e8739c;
                animation: spin .8s linear infinite;
            }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ───────── BOTTOM CTA ───────── */
        #ctaSection {
            padding: 52px 20px 64px;
            text-align: center;
            background: radial-gradient(ellipse at 50% 0%, rgba(232,115,156,.08), transparent 60%), linear-gradient(180deg, #0a0414, #120726 60%, #160a2e);
            border-top: 1px solid rgba(255,255,255,.08);
        }

            #ctaSection h2 {
                font-size: 24px;
                margin: 0 0 8px;
                font-weight: 800;
                letter-spacing: -.2px;
            }

            #ctaSection p {
                opacity: .68;
                margin: 0 0 28px;
                font-size: 14.5px;
                max-width: 420px;
                margin-left: auto;
                margin-right: auto;
                line-height: 1.5;
            }

        .ctaBtns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ctaBtn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 15px 28px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 14.5px;
            text-decoration: none;
            transition: transform .22s cubic-bezier(.4,0,.2,1), box-shadow .22s ease, filter .22s ease;
        }

            .ctaBtn.primary {
                background: linear-gradient(135deg, #e8739c, #c44569);
                color: #fff;
                box-shadow: 0 12px 32px rgba(232,115,156,.35);
            }

            .ctaBtn.secondary {
                background: rgba(255,255,255,.06);
                color: #fff;
                border: 1px solid rgba(255,255,255,.18);
            }

            .ctaBtn:hover {
                transform: translateY(-3px);
                filter: brightness(1.06);
            }

            .ctaBtn.primary:hover {
                box-shadow: 0 16px 38px rgba(232,115,156,.45);
            }

            .ctaBtn.secondary:hover {
                background: rgba(255,255,255,.11);
            }

        @media (max-width: 640px) {
            #demoBar {
                padding: 10px 12px;
                gap: 8px;
            }

                #demoBar .brand {
                    font-size: 13px;
                }

                #demoBar a.backLink {
                    padding: 7px 11px;
                    font-size: 12px;
                }

            .seg button {
                padding: 6px 12px;
                font-size: 12px;
            }

            #themeRow {
                top: 50px;
                padding: 10px 12px;
            }

            .chip {
                padding: 8px 13px;
                font-size: 12.5px;
            }

            #demoFrameWrap {
                height: calc(100vh - 101px);
            }

            #ctaSection {
                padding: 40px 16px 48px;
            }

                #ctaSection h2 {
                    font-size: 20px;
                }

            .ctaBtn {
                width: 100%;
                justify-content: center;
                padding: 15px 20px;
            }

            .ctaBtns {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div id="demoBar">
        <span class="brand">💖 Viaa</span>
        <div class="seg" id="modeSeg">
            <div class="segThumb" id="segThumb"></div>
            <button type="button" id="segLove" class="on">❤️ Love</button>
            <button type="button" id="segFriend">🫂 Friendship</button>
        </div>
        <a class="backLink" href="index.html">← Home</a>
    </div>

    <div id="themeRow"></div>

    <div id="demoFrameWrap">
        <iframe class="demoFrame" id="frameA" title="Theme preview" allow="autoplay"></iframe>
        <iframe class="demoFrame" id="frameB" title="Theme preview" allow="autoplay"></iframe>
        <div id="demoLoading"><div class="spin"></div><span id="loadingTxt">Loading theme…</span></div>
    </div>

    <div id="ctaSection">
        <h2>❤️ Love this theme?</h2>
        <p>Pick it up right where the demo left off — your names, your photos, your story, live in minutes.</p>
        <div class="ctaBtns">
            <a class="ctaBtn primary" id="useThemeBtn" href="app.html">Use This Theme →</a>
            <a class="ctaBtn secondary" id="buyBtn" href="index.html#pricing">Buy Access Code</a>
        </div>
    </div>

    <script>
        'use strict';

        /* ── Real theme catalogs (must match THEMES / FRIENDSHIP_THEMES in app.html, love.html, friendship.html) ── */
        const LOVE_THEMES = [
            { id: 'classic', label: 'Classic Love', emoji: '💝', a1: '#e8739c' },
            { id: 'red_roses', label: 'Red Roses', emoji: '🌹', a1: '#ff3355' },
            { id: 'midnight', label: 'Midnight Promise', emoji: '🌙', a1: '#7b9cff' },
            { id: 'sakura', label: 'Sakura Dreams', emoji: '🌸', a1: '#ffb7c5' },
            { id: 'golden', label: 'Golden Sunset', emoji: '✨', a1: '#f5c842' },
            { id: 'soft_princess', label: 'Soft Princess', emoji: '🎀', a1: '#f9a8d4' },
            { id: 'lavender', label: 'Lavender Sky', emoji: '🦋', a1: '#c084fc' },
            { id: 'luxury', label: 'Luxury Romance', emoji: '💎', a1: '#d4af37' },
            { id: 'birthday', label: 'Birthday', emoji: '🎂', a1: '#ff9de2' }
        ];
        const FRIEND_THEMES = [
            { id: 'golden_days', label: 'Golden Days', emoji: '☀️', a1: '#f5c842' },
            { id: 'night_talks', label: 'Night Talks', emoji: '🌌', a1: '#4facfe' },
            { id: 'gaming', label: 'Gaming', emoji: '🎮', a1: '#6bffb8' },
            { id: 'food', label: 'Food Memories', emoji: '🍕', a1: '#ff9a3c' },
            { id: 'adventure', label: 'Adventure', emoji: '🌊', a1: '#00d4aa' },
            { id: 'memories', label: 'Memories', emoji: '🏕', a1: '#c9a84c' },
            { id: 'camera_roll', label: 'Camera Roll', emoji: '📸', a1: '#b8c0ff' },
            { id: 'music', label: 'Music', emoji: '🎵', a1: '#c084fc' },
            { id: 'journey', label: 'Journey', emoji: '🧭', a1: '#38bdf8' },
            { id: 'birthday', label: 'Birthday', emoji: '🎂', a1: '#ff9de2' }
        ];
        const VALID_LOVE = new Set(LOVE_THEMES.map(t => t.id));
        const VALID_FRIEND = new Set(FRIEND_THEMES.map(t => t.id));

        let activeFrame = 'A';
        let loadSeq = 0;

        function getParams() { return new URLSearchParams(location.search); }

        function currentSelection() {
            const p = getParams();
            const fr = p.get('friendship');
            if (fr !== null) {
                return { mode: 'friendship', theme: VALID_FRIEND.has(fr) ? fr : 'golden_days' };
            }
            const th = p.get('theme');
            if (th !== null) {
                return { mode: 'love', theme: VALID_LOVE.has(th) ? th : 'classic' };
            }
            return { mode: 'love', theme: 'classic' };
        }

        function buildThemeRow(sel) {
            const row = document.getElementById('themeRow');
            row.innerHTML = '';
            const list = sel.mode === 'friendship' ? FRIEND_THEMES : LOVE_THEMES;
            list.forEach(t => {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'chip' + (t.id === sel.theme ? ' active' : '');
                if (t.id === sel.theme) {
                    chip.style.background = `linear-gradient(135deg, ${t.a1}cc, ${t.a1}88)`;
                    chip.style.boxShadow = `0 6px 18px ${t.a1}40`;
                }
                chip.innerHTML = `<span class="dot" style="background:${t.a1};color:${t.a1}"></span>${t.emoji} ${t.label}`;
                chip.addEventListener('click', () => {
                    if (t.id === sel.theme) return;
                    switchTheme(sel.mode, t.id);
                });
                row.appendChild(chip);
            });
            row.querySelector('.chip.active')?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        function setMode(mode) {
            const thumb = document.getElementById('segThumb');
            const loveBtn = document.getElementById('segLove');
            const frBtn = document.getElementById('segFriend');
            thumb.classList.toggle('toFr', mode === 'friendship');
            thumb.classList.toggle('fr', mode === 'friendship');
            loveBtn.classList.toggle('on', mode === 'love');
            frBtn.classList.toggle('on', mode === 'friendship');
        }

        function loadDemo(sel) {
            const seq = ++loadSeq;
            const loading = document.getElementById('demoLoading');
            const loadingTxt = document.getElementById('loadingTxt');
            const useBtn = document.getElementById('useThemeBtn');

            const nextId = activeFrame === 'A' ? 'B' : 'A';
            const nextFrame = document.getElementById('frame' + nextId);
            const curFrame = document.getElementById('frame' + activeFrame);

            loadingTxt.textContent = sel.mode === 'friendship' ? 'Loading friendship theme…' : 'Loading love theme…';
            loading.classList.add('on');

            const src = sel.mode === 'friendship'
                ? `friendship.html?demo=1&friendship=${encodeURIComponent(sel.theme)}`
                : `love.html?demo=1&theme=${encodeURIComponent(sel.theme)}`;

            nextFrame.onload = () => {
                if (seq !== loadSeq) return;
                loading.classList.remove('on');
                nextFrame.classList.add('show');
                curFrame.classList.remove('show');
                activeFrame = nextId;
            };
            nextFrame.src = src;

            useBtn.href = sel.mode === 'friendship'
                ? `app.html?friendship=${encodeURIComponent(sel.theme)}`
                : `app.html?theme=${encodeURIComponent(sel.theme)}`;

            const newUrl = sel.mode === 'friendship'
                ? `demo.html?friendship=${encodeURIComponent(sel.theme)}`
                : `demo.html?theme=${encodeURIComponent(sel.theme)}`;
            history.replaceState(null, '', newUrl);
        }

        function switchTheme(mode, theme) {
            const sel = { mode, theme };
            setMode(mode);
            buildThemeRow(sel);
            loadDemo(sel);
        }

        function init() {
            const sel = currentSelection();
            setMode(sel.mode);
            buildThemeRow(sel);
            loadDemo(sel);

            document.getElementById('segLove').addEventListener('click', () => {
                if (currentSelection().mode === 'love') return;
                switchTheme('love', 'classic');
            });
            document.getElementById('segFriend').addEventListener('click', () => {
                if (currentSelection().mode === 'friendship') return;
                switchTheme('friendship', 'golden_days');
            });
        }

        init();
    </script>
</body>
</html>
