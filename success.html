<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Status — Viaa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root{
  --bg:#F8FAFC; --card:#FFFFFF; --coral:#FF8A65; --coral3:rgba(255,138,101,.12);
  --text:#1E293B; --muted:#64748B; --bord:rgba(0,0,0,.08);
  --sh-md:0 4px 20px rgba(0,0,0,.09),0 2px 8px rgba(0,0,0,.05);
  --fd:'Playfair Display',Georgia,serif; --fu:'Inter',system-ui,sans-serif;
}
body{ font-family:var(--fu); background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card{ background:var(--card); border:1px solid var(--bord); border-radius:20px; padding:36px 28px; box-shadow:var(--sh-md); max-width:420px; width:100%; text-align:center; }
.icon{ font-size:40px; margin-bottom:14px; }
h1{ font-family:var(--fd); font-size:22px; margin-bottom:8px; }
.sub{ color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.6; }
.code-box{ background:var(--coral3); border-radius:14px; padding:18px; margin-bottom:18px; display:none; }
.code-box .code{ font-family:var(--fd); font-size:26px; font-weight:700; letter-spacing:2px; color:var(--coral); }
.note{ font-size:12px; color:var(--muted); margin-top:8px; }
.btn{ display:inline-block; width:100%; padding:14px; border-radius:14px; border:none; font-weight:700; font-size:15px; cursor:pointer; text-decoration:none; margin-top:6px; }
.btn.pri{ background:linear-gradient(120deg,var(--coral),#FF6F3D); color:#fff; }
.btn.sec{ background:#fff; border:1.5px solid var(--bord); color:var(--text); }
.spin{ width:36px; height:36px; border:3px solid var(--coral3); border-top-color:var(--coral); border-radius:50%; animation:sp .8s linear infinite; margin:0 auto 18px; }
@keyframes sp{ to{ transform:rotate(360deg); } }
.pending .spin{ display:block; }
.pending .icon{ display:none; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="spin" id="spinner" style="display:none"></div>
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Checking your payment…</h1>
    <p class="sub" id="sub">This usually takes a moment.</p>
    <div class="code-box" id="codeBox">
      <div class="code" id="codeValue">—</div>
      <div class="note">Save this — it won't be shown again. Use it to open the page builder.</div>
    </div>
    <a class="btn pri" id="builderLink" href="app.html" style="display:none">Open Page Builder →</a>
    <a class="btn sec" href="index.html" style="margin-top:10px">Back to Home</a>
  </div>

<script>
(function () {
  const qs = new URLSearchParams(window.location.search);
  const id = qs.get('id');
  const card = document.getElementById('card');
  const icon = document.getElementById('icon');
  const spinner = document.getElementById('spinner');
  const title = document.getElementById('title');
  const sub = document.getElementById('sub');
  const codeBox = document.getElementById('codeBox');
  const codeValue = document.getElementById('codeValue');
  const builderLink = document.getElementById('builderLink');

  if (!id) {
    title.textContent = 'Missing payment reference';
    sub.textContent = 'Please go back and submit your payment again.';
    return;
  }

  let attempts = 0;
  const maxAttempts = 200; // ~10 minutes at 3s interval

  async function poll() {
    attempts++;
    try {
      const res = await fetch(`/api/submit-payment?id=${encodeURIComponent(id)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Not found');

      if (data.status === 'approved') {
        card.classList.remove('pending');
        spinner.style.display = 'none';
        icon.style.display = 'block';
        icon.textContent = '✅';
        title.textContent = 'Payment Confirmed!';
        sub.textContent = 'Your access code is ready.';
        codeBox.style.display = 'block';
        codeValue.textContent = data.code;
        builderLink.style.display = 'block';
        builderLink.href = `app.html?code=${encodeURIComponent(data.code)}`;
        return; // stop polling
      }
      if (data.status === 'rejected') {
        spinner.style.display = 'none';
        icon.style.display = 'block';
        icon.textContent = '❌';
        title.textContent = 'Payment Not Confirmed';
        sub.textContent = "We couldn't verify this payment. Contact support or try again.";
        return; // stop polling
      }

      // still pending
      icon.style.display = 'none';
      spinner.style.display = 'block';
      title.textContent = 'Waiting for confirmation…';
      sub.textContent = 'We notify our team instantly — this usually takes a few minutes.';
      if (attempts < maxAttempts) setTimeout(poll, 3000);
      else { title.textContent = 'Still pending'; sub.textContent = 'Please check back later or contact support.'; }
    } catch (err) {
      if (attempts < maxAttempts) setTimeout(poll, 4000);
    }
  }

  poll();
})();
</script>
</body>
</html>
