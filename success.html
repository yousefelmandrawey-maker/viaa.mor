<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Status — Viaa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root{
  --bg:#F7F8FA; --card:#FFFFFF; --coral:#FF8A65; --coral-d:#F2703F; --coral3:rgba(255,138,101,.10);
  --text:#161B22; --muted:#66707D; --bord:rgba(15,23,42,.08);
  --sh-md:0 8px 24px rgba(15,23,42,.07), 0 2px 6px rgba(15,23,42,.04);
  --sh-lg:0 24px 60px rgba(15,23,42,.14), 0 6px 16px rgba(15,23,42,.06);
  --r-md:14px; --r-lg:22px;
  --fd:'Playfair Display',Georgia,serif; --fu:'Inter',system-ui,sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
}
html{ -webkit-font-smoothing:antialiased; }
body{ font-family:var(--fu); background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; line-height:1.5; }
.card{ background:var(--card); border:1px solid var(--bord); border-radius:var(--r-lg); padding:40px 30px; box-shadow:var(--sh-md); max-width:420px; width:100%; text-align:center; transition:box-shadow .4s var(--ease); animation:cardIn .5s var(--ease); position:relative; overflow:hidden; }
@keyframes cardIn{ from{ opacity:0; transform:translateY(14px) scale(.98); } to{ opacity:1; transform:none; } }
.card.approved{ box-shadow:var(--sh-lg); }

.icon{ font-size:42px; margin-bottom:16px; }
.icon.pop{ animation:pop .55s var(--ease); }
@keyframes pop{ 0%{ transform:scale(.4); opacity:0; } 60%{ transform:scale(1.12); opacity:1; } 100%{ transform:scale(1); } }

h1{ font-family:var(--fd); font-size:23px; font-weight:700; margin-bottom:8px; letter-spacing:-.01em; }
.sub{ color:var(--muted); font-size:14px; margin-bottom:24px; line-height:1.6; }

.code-box{ background:linear-gradient(135deg,var(--coral3),rgba(255,138,101,.04)); border:1px solid rgba(255,138,101,.18); border-radius:var(--r-md); padding:22px 18px; margin-bottom:20px; display:none; position:relative; }
.code-box.show{ display:block; animation:fadeUp .45s var(--ease) .1s both; }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
.code-box .code-label{ font-size:11px; font-weight:600; color:var(--coral-d); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
.code-box .code{ font-family:var(--fd); font-size:27px; font-weight:700; letter-spacing:3px; color:var(--coral-d); word-break:break-all; }
.note{ font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5; }

.btn{ display:inline-flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:14px; border-radius:var(--r-md); border:none; font-weight:600; font-size:15px; cursor:pointer; text-decoration:none; margin-top:8px; transition:transform .2s var(--ease), box-shadow .2s var(--ease); }
.btn.pri{ background:linear-gradient(135deg,var(--coral),var(--coral-d)); color:#fff; box-shadow:0 8px 24px rgba(255,138,101,.30); }
.btn.pri:hover{ transform:translateY(-2px); box-shadow:0 14px 32px rgba(255,138,101,.38); }
.btn.sec{ background:#fff; border:1.5px solid var(--bord); color:var(--text); }
.btn.sec:hover{ border-color:rgba(15,23,42,.2); }

.spin{ width:38px; height:38px; border:3px solid var(--coral3); border-top-color:var(--coral); border-radius:50%; animation:sp .8s linear infinite; margin:0 auto 18px; }
@keyframes sp{ to{ transform:rotate(360deg); } }
.pending .spin{ display:block; }
.pending .icon{ display:none; }

.dots span{ display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--muted); margin:0 2px; opacity:.35; animation:blink 1.3s infinite; }
.dots span:nth-child(2){ animation-delay:.2s; }
.dots span:nth-child(3){ animation-delay:.4s; }
@keyframes blink{ 0%,80%,100%{ opacity:.25; } 40%{ opacity:.85; } }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="spin" id="spinner" style="display:none"></div>
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Checking your payment…</h1>
    <p class="sub" id="sub">This usually takes a moment.</p>
    <div class="code-box" id="codeBox">
      <div class="code-label">Your access code</div>
      <div class="code" id="codeValue">—</div>
      <div class="note">Save this — it won't be shown again. Use it to open the page builder.</div>
    </div>
    <a class="btn pri" id="builderLink" href="app.html" style="display:none">Open Page Builder →</a>
    <a class="btn sec" href="index.html" style="margin-top:10px">Back to Home</a>
  </div>

<script>
(function () {
  const qs = new URLSearchParams(window.location.search);
  const id = qs.get('id');
  const card = document.getElementById('card');
  const icon = document.getElementById('icon');
  const spinner = document.getElementById('spinner');
  const title = document.getElementById('title');
  const sub = document.getElementById('sub');
  const codeBox = document.getElementById('codeBox');
  const codeValue = document.getElementById('codeValue');
  const builderLink = document.getElementById('builderLink');

  if (!id) {
    title.textContent = 'Missing payment reference';
    sub.textContent = 'Please go back and submit your payment again.';
    return;
  }

  let attempts = 0;
  const maxAttempts = 200; // ~10 minutes at 3s interval

  async function poll() {
    attempts++;
    try {
      const res = await fetch(`/api/submit-payment?id=${encodeURIComponent(id)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Not found');

      if (data.status === 'approved') {
        card.classList.remove('pending');
        card.classList.add('approved');
        spinner.style.display = 'none';
        icon.style.display = 'block';
        icon.textContent = '✅';
        icon.classList.add('pop');
        title.textContent = 'Payment Confirmed!';
        sub.textContent = 'Your access code is ready.';
        codeBox.classList.add('show');
        codeValue.textContent = data.code;
        builderLink.style.display = 'flex';
        builderLink.href = `app.html?code=${encodeURIComponent(data.code)}`;
        return; // stop polling
      }
      if (data.status === 'rejected') {
        spinner.style.display = 'none';
        icon.style.display = 'block';
        icon.textContent = '❌';
        title.textContent = 'Payment Not Confirmed';
        sub.textContent = "We couldn't verify this payment. Contact support or try again.";
        return; // stop polling
      }

      // still pending
      icon.style.display = 'none';
      spinner.style.display = 'block';
      title.textContent = 'Waiting for confirmation…';
      sub.innerHTML = 'We notify our team instantly — this usually takes a few minutes<span class="dots"><span></span><span></span><span></span></span>';
      if (attempts < maxAttempts) setTimeout(poll, 3000);
      else { title.textContent = 'Still pending'; sub.textContent = 'Please check back later or contact support.'; }
    } catch (err) {
      if (attempts < maxAttempts) setTimeout(poll, 4000);
    }
  }

  poll();
})();
</script>
</body>
</html>
