<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Payments</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root{
  --bg:#F8FAFC; --card:#FFFFFF; --coral:#FF8A65; --coral3:rgba(255,138,101,.12);
  --text:#1E293B; --muted:#64748B; --bord:rgba(0,0,0,.08);
  --fd:'Playfair Display',Georgia,serif; --fu:'Inter',system-ui,sans-serif;
}
body{ font-family:var(--fu); background:var(--bg); color:var(--text); padding:24px 16px 60px; }
.wrap{ max-width:760px; margin:0 auto; }
h1{ font-family:var(--fd); font-size:24px; margin-bottom:18px; }
.gate{ max-width:360px; margin:80px auto; background:#fff; border:1px solid var(--bord); border-radius:16px; padding:26px; text-align:center; }
.gate input{ width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--bord); margin:14px 0; font-size:14px; }
.gate button{ width:100%; padding:12px; border-radius:10px; border:none; background:var(--coral); color:#fff; font-weight:700; cursor:pointer; }
#dashboard{ display:none; }
.toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.toolbar button{ background:#fff; border:1.5px solid var(--bord); border-radius:10px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
.empty{ color:var(--muted); text-align:center; padding:60px 0; font-size:14px; }
.row{ background:#fff; border:1px solid var(--bord); border-radius:14px; padding:16px; margin-bottom:12px; display:flex; gap:14px; align-items:flex-start; }
.row img{ width:64px; height:64px; object-fit:cover; border-radius:10px; flex-shrink:0; cursor:pointer; }
.row .info{ flex:1; min-width:0; }
.row .name{ font-weight:700; font-size:15px; }
.row .meta{ font-size:12px; color:var(--muted); margin-top:2px; line-height:1.6; }
.row .actions{ display:flex; gap:8px; margin-top:10px; }
.row .actions button{ padding:8px 14px; border-radius:8px; border:none; font-weight:700; font-size:12px; cursor:pointer; }
.btn-approve{ background:#16A34A; color:#fff; }
.btn-reject{ background:#EF4444; color:#fff; }
.row .actions button:disabled{ opacity:.5; cursor:not-allowed; }
</style>
</head>
<body>
  <div class="gate" id="gate">
    <h1 style="font-size:18px">Admin Access</h1>
    <input type="password" id="tokenInput" placeholder="Admin token">
    <button id="gateBtn">Enter</button>
  </div>

  <div class="wrap" id="dashboard">
    <div class="toolbar">
      <h1>Pending Payments</h1>
      <button id="refreshBtn">↻ Refresh</button>
    </div>
    <div id="list"></div>
  </div>

<script>
(function () {
  let token = sessionStorage.getItem('viaa_admin_token') || '';

  function showDashboard() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadList();
  }

  if (token) showDashboard();

  document.getElementById('gateBtn').addEventListener('click', () => {
    token = document.getElementById('tokenInput').value.trim();
    if (!token) return;
    sessionStorage.setItem('viaa_admin_token', token);
    showDashboard();
  });

  document.getElementById('refreshBtn').addEventListener('click', loadList);

  async function loadList() {
    const list = document.getElementById('list');
    list.innerHTML = '<p class="empty">Loading…</p>';
    try {
      const res = await fetch(`/api/submit-payment?admin=1&token=${encodeURIComponent(token)}&action=list`);
      const data = await res.json();
      if (res.status === 401) {
        sessionStorage.removeItem('viaa_admin_token');
        document.getElementById('gate').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        return;
      }
      if (!res.ok) throw new Error(data.error || 'Failed to load');

      const payments = (data.payments || []).sort((a, b) => b.createdAt - a.createdAt);
      if (!payments.length) {
        list.innerHTML = '<p class="empty">No pending payments 🎉</p>';
        return;
      }
      list.innerHTML = '';
      payments.forEach((p) => list.appendChild(renderRow(p)));
    } catch (err) {
      list.innerHTML = `<p class="empty">${err.message}</p>`;
    }
  }

  function renderRow(p) {
    const row = document.createElement('div');
    row.className = 'row';
    const methodLabel = p.method === 'vodafone_cash' ? 'Vodafone Cash' : 'InstaPay';
    row.innerHTML = `
      <img src="${p.screenshotUrl}" alt="screenshot" onclick="window.open('${p.screenshotUrl}','_blank')">
      <div class="info">
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="meta">
          ${escapeHtml(p.email)} · ${escapeHtml(p.phone)}<br>
          ${methodLabel} · transaction ${escapeHtml(p.senderNumber)} · ${escapeHtml(String(p.amount))} EGP<br>
          ${escapeHtml(p.product)} · ${new Date(p.createdAt).toLocaleString()}
        </div>
        <div class="actions">
          <button class="btn-approve" data-id="${p.id}">Approve</button>
          <button class="btn-reject" data-id="${p.id}">Reject</button>
        </div>
      </div>`;
    row.querySelector('.btn-approve').addEventListener('click', (e) => act(p.id, 'approve', e.target));
    row.querySelector('.btn-reject').addEventListener('click', (e) => act(p.id, 'reject', e.target));
    return row;
  }

  async function act(id, action, btn) {
    btn.disabled = true;
    btn.parentElement.querySelectorAll('button').forEach((b) => (b.disabled = true));
    try {
      const res = await fetch('/api/approve-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminToken: token, id, action }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Action failed');
      loadList();
    } catch (err) {
      alert(err.message);
      loadList();
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }
})();
</script>
</body>
</html>
